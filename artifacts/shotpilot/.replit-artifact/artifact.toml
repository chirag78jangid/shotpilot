kind = "web"
previewPath = "/"
title = "ShotPilot"
version = "1.0.0"
id = "artifacts/shotpilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26137

[services.development]
run = "pnpm --filter @workspace/shotpilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shotpilot", "run", "build" ]
publicDir = "artifacts/shotpilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26137"
BASE_PATH = "/"
